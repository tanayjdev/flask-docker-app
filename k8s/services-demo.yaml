# ==========================================
# ClusterIP Service for Flask (Internal)
# ==========================================

apiVersion: v1
kind: Service

metadata:
  name: flask-internal

spec:
  selector:
    app: flask-app

  ports:
    - protocol: TCP
      port: 5000
      targetPort: 5000

  type: ClusterIP

---
# ==========================================
# NodePort Service for Flask (External)
# ==========================================

apiVersion: v1
kind: Service

metadata:
  name: flask-nodeport

spec:
  selector:
    app: flask-app

  ports:
    - protocol: TCP
      port: 80
      targetPort: 5000
      nodePort: 30080

  type: NodePort

---
# ==========================================
# Second Deployment (Backend API Demo)
# ==========================================

apiVersion: apps/v1
kind: Deployment

metadata:
  name: backend-api

spec:
  replicas: 2

  selector:
    matchLabels:
      app: backend-api

  template:
    metadata:
      labels:
        app: backend-api

    spec:
      containers:
        - name: api
          image: nginx:latest

          ports:
            - containerPort: 80

---
# ==========================================
# ClusterIP Service for Backend API
# ==========================================

apiVersion: v1
kind: Service

metadata:
  name: backend-service

spec:
  selector:
    app: backend-api

  ports:
    - protocol: TCP
      port: 80
      targetPort: 80

  type: ClusterIP
