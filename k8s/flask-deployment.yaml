apiVersion: apps/v1
kind: Deployment

metadata:
  name: flask-app
  labels:
    app: flask-app

spec:
  replicas: 2

  selector:
    matchLabels:
      app: flask-app

  template:
    metadata:
      labels:
        app: flask-app

    spec:
      containers:
      - name: flask
        image: IMAGE_TAG_PLACEHOLDER

        ports:
        - containerPort: 5000

        env:
        - name: DB_HOST
          value: "localhost"

        resources:
          requests:
            memory: "64Mi"
            cpu: "50m"

          limits:
            memory: "128Mi"
            cpu: "100m"

        livenessProbe:
          httpGet:
            path: /health
            port: 5000

          initialDelaySeconds: 30
          periodSeconds: 30
