apiVersion: apps/v1
kind: Deployment

metadata:
  name: flask-complete

spec:
  replicas: 2

  selector:
    matchLabels:
      app: flask-complete

  template:
    metadata:
      labels:
        app: flask-complete

    spec:
      containers:
      - name: flask
        image: tanayjain29/flask-devops-app:v1.0

        ports:
        - containerPort: 5000

        envFrom:
        - configMapRef:
            name: flask-config

        env:
        - name: DB_USER
          valueFrom:
            secretKeyRef:
              name: flask-secrets
              key: DB_USER

        - name: DB_PASSWORD
          valueFrom:
            secretKeyRef:
              name: flask-secrets
              key: DB_PASSWORD

        livenessProbe:
          httpGet:
            path: /health
            port: 5000
          initialDelaySeconds: 30
          periodSeconds: 30

        readinessProbe:
          httpGet:
            path: /health
            port: 5000
          initialDelaySeconds: 15
          periodSeconds: 10

        resources:
          requests:
            memory: "64Mi"
            cpu: "50m"

          limits:
            memory: "256Mi"
            cpu: "200m"

---
apiVersion: v1
kind: Service

metadata:
  name: flask-complete-service

spec:
  selector:
    app: flask-complete

  ports:
  - port: 80
    targetPort: 5000

  type: NodePort
