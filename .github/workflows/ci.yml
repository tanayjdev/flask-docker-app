name: CI — Lint and Test

on:
  push:
    branches: [ main, develop ]
    paths:
      - '**.py'
      - 'requirements.txt'
      - 'Dockerfile'
      - '.github/workflows/ci.yml'
  pull_request:
    branches: [ main ]

jobs:
  lint:
    name: Code Quality Check
    runs-on: ubuntu-latest

    steps:
      - name: Code checkout karo
        uses: actions/checkout@v3

      - name: Python setup karo
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'
          cache: 'pip'    # pip cache karo — fast rebuild

      - name: Dependencies install karo
        run: |
          python -m pip install --upgrade pip
          pip install flake8

      - name: Flake8 lint run karo
        run: |
          echo "Python files checking..."
          flake8 . --count --statistics
          echo "Lint passed!"

  test:
    name: Unit Tests
    runs-on: ubuntu-latest
    needs: lint    # Lint pass hone ke baad hi tests chalao

    steps:
      - name: Code checkout karo
        uses: actions/checkout@v3

      - name: Python setup karo
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'
          cache: 'pip'

      - name: Dependencies install karo
        run: |
          pip install -r requirements.txt

      - name: Tests run karo
        run: |
          pytest test_app.py -v --tb=short

      - name: Coverage report banao
        run: |
          pytest test_app.py \
            --cov=app \
            --cov-report=term-missing \
            --cov-report=xml

      - name: Coverage artifact save karo
        uses: actions/upload-artifact@v3
        if: always()
        with:
          name: coverage-report
          path: coverage.xml
          retention-days: 7

  code-quality-summary:
    name: Quality Summary
    runs-on: ubuntu-latest
    needs: [lint, test]
    if: always()

    steps:
      - name: Status check
        run: |
          echo "Lint status: ${{ needs.lint.result }}"
          echo "Test status: ${{ needs.test.result }}"

          if [[ "${{ needs.lint.result }}" == "success" && \
                "${{ needs.test.result }}" == "success" ]]; then
            echo "✅ All quality checks passed!"
            echo "Ready for Docker build"
          else
            echo "❌ Quality checks failed"
            exit 1
          fi
