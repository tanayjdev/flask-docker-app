name: Main CI/CD Pipeline

on:
  push:
    branches: [ main ]

  pull_request:
    branches: [ main ]

  workflow_dispatch:
    inputs:
      skip_tests:
        description: 'Tests skip karo?'
        required: false
        default: false
        type: boolean

      environment:
        description: 'Deploy environment'
        required: false
        default: 'production'
        type: choice
        options:
          - production
          - staging

env:
  AWS_REGION: ap-south-1
  IMAGE_NAME: ${{ secrets.ECR_REGISTRY }}/${{ secrets.ECR_REPOSITORY }}
  PYTHON_VERSION: '3.10'
  CACHE_KEY_PREFIX: v1

jobs:

  ###########################################################
  # LINT
  ###########################################################

  lint:
    name: 🔍 Lint
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: pip

      - name: Install Flake8
        run: pip install flake8

      - name: Pipeline Notice
        run: echo "::notice::Lint job started"

      - name: Run Flake8
        run: flake8 . --count --statistics

  ###########################################################
  # TEST
  ###########################################################

  test:
    name: 🧪 Test
    runs-on: ubuntu-latest
    needs: lint

    if: ${{ github.event.inputs.skip_tests != 'true' }}

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: pip

      - name: Cache pip packages
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: ${{ env.CACHE_KEY_PREFIX }}-${{ runner.os }}-pip-${{ hashFiles('requirements.txt') }}
          restore-keys: |
            ${{ env.CACHE_KEY_PREFIX }}-${{ runner.os }}-pip-

      - name: Test Notice
        run: echo "::notice::Running tests"

      - name: Install Dependencies
        run: pip install -r requirements.txt

      - name: Run Tests
        run: pytest test_app.py -v --tb=short

      - name: Debug Information
        run: |
          echo "Python: $(python --version)"
          echo "pip: $(pip --version)"
          echo "Working dir: $(pwd)"
          echo "Files:"
          ls -la
          echo "Environment:"
          env | sort | grep -v SECRET | grep -v TOKEN

      - name: Generate Coverage
        run: |
          pytest test_app.py \
            --cov=. \
            --cov-report=xml \
            --cov-report=term

      - name: Upload Coverage Report
        uses: actions/upload-artifact@v4

        if: always()

        with:
          name: coverage-report
          path: coverage.xml
          retention-days: 5

  ###########################################################
  # BUILD + PUSH
  ###########################################################

  docker-build:
    name: 🐳 Docker Build & Push

    runs-on: ubuntu-latest

    needs:
      - lint
      - test

    outputs:
      image-tag: ${{ github.sha }}

    steps:

      - uses: actions/checkout@v4

      - uses: docker/setup-buildx-action@v3

      - name: Configure AWS Credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Login to Amazon ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v2

      - name: Build and Push Docker Image

        uses: docker/build-push-action@v5

        with:
          context: .

          push: ${{ github.event_name != 'pull_request' }}

          tags: |
            ${{ env.IMAGE_NAME }}:latest
            ${{ env.IMAGE_NAME }}:${{ github.sha }}

          cache-from: type=gha

          cache-to: type=gha,mode=max

      - name: Build Summary
        run: |
          echo "### 🐳 Docker Build Complete" >> $GITHUB_STEP_SUMMARY
          echo "Image: ${{ env.IMAGE_NAME }}:latest" >> $GITHUB_STEP_SUMMARY

  ###########################################################
  # DEPLOY
  ###########################################################

  deploy:
    name: 🚀 Deploy to EC2

    runs-on: ubuntu-latest

    needs: docker-build

    if: github.event_name == 'push' && github.ref == 'refs/heads/main'

    environment: production

    steps:

      - name: 🚀 Deployment Started Notification
        uses: slackapi/slack-github-action@v1.24.0
        with:
          payload: |
            {
              "text": "🚀 Deployment Started",
              "blocks": [
                {
                  "type": "section",
                  "text": {
                    "type": "mrkdwn",
                    "text": "🚀 *Deployment Started*\n*Repository:* ${{ github.repository }}\n*Branch:* ${{ github.ref_name }}\n*Actor:* ${{ github.actor }}"
                  }
                }
              ]
            }
        env:
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}
          SLACK_WEBHOOK_TYPE: INCOMING_WEBHOOK

      - name: Deployment Notice
        run: echo "::notice::Deployment is starting"

      - name: Deploy to EC2
        uses: appleboy/ssh-action@v1.0.0
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USERNAME }}
          key: ${{ secrets.EC2_SSH_KEY }}
          script: |
            set -e

            echo "=== Deployment Started ==="

            cd ~/flask-docker-app

            aws ecr get-login-password --region ${{ env.AWS_REGION }} | docker login --username AWS --password-stdin ${{ secrets.ECR_REGISTRY }}

            echo "Pulling latest Docker image..."

            docker compose pull

            docker compose up -d --force-recreate

            sleep 15

            HEALTH=$(curl -s -o /dev/null -w "%{http_code}" http://localhost:5000/health)

            if [ "$HEALTH" = "200" ]; then
              echo "✅ Application Healthy"
              docker compose ps
            else
              echo "❌ Deployment Failed"
              docker compose logs --tail=30
              exit 1
            fi

            echo "Deployment finished."

      - name: ✅ Success Notification
        if: success()
        uses: slackapi/slack-github-action@v1.24.0
        with:
          payload: |
            {
              "text": "✅ Deployment Successful",
              "blocks": [
                {
                  "type": "section",
                  "text": {
                    "type": "mrkdwn",
                    "text": "✅ *Deployment Successful*\n*Repository:* ${{ github.repository }}\n*Environment:* Production\n*Actor:* ${{ github.actor }}"
                  }
                }
              ]
            }
        env:
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}
          SLACK_WEBHOOK_TYPE: INCOMING_WEBHOOK

      - name: ❌ Failure Notification
        if: failure()
        uses: slackapi/slack-github-action@v1.24.0
        with:
          payload: |
            {
              "text": "❌ Deployment Failed",
              "blocks": [
                {
                  "type": "section",
                  "text": {
                    "type": "mrkdwn",
                    "text": "❌ *Deployment FAILED!*\n*Repo:* ${{ github.repository }}\n*Branch:* ${{ github.ref_name }}\n*By:* ${{ github.actor }}\n*Action:* <${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}|View Logs>"
                  }
                }
              ]
            }
        env:
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}
          SLACK_WEBHOOK_TYPE: INCOMING_WEBHOOK

      - name: Deployment Summary
        if: always()
        run: |
          STATUS="${{ job.status }}"

          if [ "$STATUS" = "success" ]; then
            echo "### ✅ Deployment Successful!" >> $GITHUB_STEP_SUMMARY
          else
            echo "### ❌ Deployment Failed!" >> $GITHUB_STEP_SUMMARY
          fi

          echo "Environment: production" >> $GITHUB_STEP_SUMMARY
          echo "Time: $(date)" >> $GITHUB_STEP_SUMMARY

  ###########################################################
# SUMMARY
###########################################################

  summary:
    name: 📊 Summary

    runs-on: ubuntu-latest

    needs:
      - lint
      - test
      - docker-build
      - deploy

    if: always()

    steps:

      - name: Final Summary

        run: |
          echo "## Pipeline Run Summary" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| Job | Status |" >> $GITHUB_STEP_SUMMARY
          echo "|-----|--------|" >> $GITHUB_STEP_SUMMARY
          echo "| Lint | ${{ needs.lint.result }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Test | ${{ needs.test.result }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Build | ${{ needs.docker-build.result }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Deploy | ${{ needs.deploy.result }} |" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "**Triggered by:** ${{ github.actor }}" >> $GITHUB_STEP_SUMMARY
          echo "**Commit:** \`${{ github.sha }}\`" >> $GITHUB_STEP_SUMMARY
          echo "**Time:** $(date)" >> $GITHUB_STEP_SUMMARY